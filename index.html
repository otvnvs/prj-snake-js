<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Snake | Swipe to Play</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            background-color: #1a1a1a; color: #fff; font-family: sans-serif;
            overflow: hidden; touch-action: none; /* Prevents screen scrolling while playing */
        }
        canvas {
            border: 3px solid #444; background-color: #000;
            max-width: 90vw; max-height: 70vh; /* Responsive sizing */
        }
        .score-board { font-size: 1.5rem; margin-bottom: 10px; }
        .hint { margin-top: 10px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    <canvas id="snakeGame"></canvas>
    <div class="hint">Swipe or use Arrow Keys</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = 20;
        canvas.width = canvas.height = 400; // Fixed internal resolution

        let score = 0, dx = 0, dy = 0;
        let snake = [{x: 10, y: 10}], food = {x: 5, y: 5};

        function main() {
            if (didGameEnd()) {
		drawGameOver(); // Render red text instead of alert
		return; // Stop the game loop
            }
            setTimeout(() => {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        // --- GESTURE DETECTION LOGIC ---
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, false);

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;

            // Determine if swipe was more horizontal or vertical
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) { // Threshold to avoid accidental taps
                    if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; } // Right
                    else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; } // Left
                }
            } else {
                if (Math.abs(diffY) > 30) {
                    if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; } // Down
                    else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; } // Up
                }
            }
        }

        // --- CORE GAME FUNCTIONS ---
        function clearCanvas() { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
	function drawGameOver() {
	    // Semi-transparent overlay to make text pop
	    ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
	    ctx.fillRect(0, 0, canvas.width, canvas.height);

	    ctx.fillStyle = "#ff3131"; // Bright Red
	    ctx.font = "bold 30px Courier New";
	    ctx.textAlign = "center";
	    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

	    ctx.fillStyle = "white";
	    ctx.font = "16px Courier New";
	    ctx.fillText("Tap or Press a Key to Restart", canvas.width / 2, canvas.height / 2 + 40);

	    // Click/Tap to restart
	    const restart = () => document.location.reload();
	    canvas.addEventListener("mousedown", restart);
	    canvas.addEventListener("touchstart", restart);
	    document.addEventListener("keydown", restart);
	}
        function drawSnake() {
            ctx.fillStyle = "#00FF41";
            snake.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2));
        }
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreElement.innerHTML = score; createFood();
            } else { snake.pop(); }
        }
        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            const head = snake[0];
            const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
            const hitSelf = snake.slice(1).some(part => part.x === head.x && part.y === head.y);
            return hitWall || hitSelf;
        }
        function createFood() {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
        }
        function drawFood() {
            ctx.fillStyle = "#FF3131";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }
        function resetGame() { score = 0; scoreElement.innerHTML = score; snake = [{x: 10, y: 10}]; dx = 0; dy = 0; createFood(); }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        });

        createFood();
        main();
    </script>
</body>
</html>
