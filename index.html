<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake | Portfolio Demo</title>
    <style>
        /* CSS: Clean, centered, and full-screen focused */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        canvas {
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }

        .score-board {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .instructions {
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    <canvas id="snakeGame"></canvas>
    <div class="instructions">Use Arrow Keys to Move</div>

    <script>
        /* JS: The Game Logic */
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Dynamic sizing for responsiveness
        const gridSize = 20;
        const tileCount = 20;
        canvas.width = canvas.height = gridSize * tileCount;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};

        function main() {
            if (didGameEnd()) {
                alert("Game Over! Score: " + score);
                resetGame();
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // Game Speed
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00FF41"; // Classic Matrix Green
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false; // Don't end if not moving

            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            let hitSelf = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) hitSelf = true;
            }

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall || hitSelf;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function drawFood() {
            ctx.fillStyle = "#FF3131";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = score;
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            createFood();
        }

        document.addEventListener("keydown", (e) => {
            const key = e.key;
            if (key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
            if (key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
            if (key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
            if (key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        });

        createFood();
        main();
    </script>
</body>
</html>
